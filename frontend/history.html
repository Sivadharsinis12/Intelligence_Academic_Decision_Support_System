<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - IADSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --warning-color: #f39c12;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background: var(--primary-color);
            color: white;
            padding: 20px;
        }
        .sidebar .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            padding: 10px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            display: block;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }
        .sidebar a:hover, .sidebar a.active {
            background: var(--secondary-color);
        }
        .sidebar a i {
            margin-right: 10px;
        }
        .main-content {
            padding: 30px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card-header {
            background: white;
            border-bottom: 2px solid #f0f0f0;
            font-weight: 600;
            padding: 15px 20px;
        }
        .history-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
        }
        .history-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--secondary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .history-content {
            flex: 1;
        }
        .history-type {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .history-meta {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
        }
        .history-criteria {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .criteria-tag {
            background: #e9ecef;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .filter-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 sidebar">
                <div class="logo">
                    <i class="fas fa-graduation-cap me-2"></i>IADSS
                </div>
                <a href="index.html">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="dashboard.html">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="analytics.html">
                    <i class="fas fa-chart-bar"></i> Analytics
                </a>
                <a href="history.html" class="active">
                    <i class="fas fa-history"></i> History
                </a>
            </div>
            <div class="col-md-9 main-content">
                <h2 class="mb-4">History</h2>
                
                <div class="filter-section">
                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label">Search</label>
                            <input type="text" class="form-control" placeholder="Search history...">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Type</label>
                            <select class="form-select">
                                <option value="">All Types</option>
                                <option>Enrollment Projection</option>
                                <option>Budget Impact</option>
                                <option>Student Success</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Date Range</label>
                            <select class="form-select">
                                <option>All Time</option>
                                <option>Last 7 Days</option>
                                <option>Last 30 Days</option>
                                <option>Last Year</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-list me-2"></i>Recent Activity
                    </div>
                    <div class="card-body" id="history-list">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                const container = document.getElementById('history-list');
                
                const iconMap = {
                    'Enrollment Projection': 'fa-user-graduate',
                    'Budget Impact': 'fa-dollar-sign',
                    'Student Success': 'fa-graduation-cap'
                };
                
                container.innerHTML = data.map(item => `
                    <div class="history-card">
                        <div class="history-icon">
                            <i class="fas ${iconMap[item.type] || 'fa-file-alt'}"></i>
                        </div>
                        <div class="history-content">
                            <div class="history-type">${item.type}</div>
                            <div class="history-meta">
                                <i class="far fa-calendar-alt me-1"></i>${item.date} 
                                <i class="far fa-clock me-1 ms-2"></i>${item.time}
                            </div>
                            <div class="history-criteria">
                                ${item.criteria.map(c => `<span class="criteria-tag">${c}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        loadHistory();
    </script>
</body>
</html>
