<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - IADSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --warning-color: #f39c12;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background: var(--primary-color);
            color: white;
            padding: 20px;
        }
        .sidebar .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            padding: 10px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            display: block;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }
        .sidebar a:hover, .sidebar a.active {
            background: var(--secondary-color);
        }
        .sidebar a i {
            margin-right: 10px;
        }
        .main-content {
            padding: 30px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .card-header {
            background: white;
            border-bottom: 2px solid #f0f0f0;
            font-weight: 600;
            padding: 15px 20px;
        }
        .student-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .student-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--secondary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .student-info {
            flex: 1;
        }
        .student-name {
            font-weight: 600;
            margin-bottom: 5px;
        }
        .student-details {
            font-size: 0.9rem;
            color: #666;
        }
        .risk-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .risk-high {
            background: #fee;
            color: var(--accent-color);
        }
        .risk-medium {
            background: #ffeaa7;
            color: #856404;
        }
        .risk-low {
            background: #d4edda;
            color: var(--success-color);
        }
        .difficulty-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .difficulty-label {
            font-weight: 600;
            margin-bottom: 10px;
        }
        .progress {
            height: 25px;
            border-radius: 12px;
        }
        .progress-bar {
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 sidebar">
                <div class="logo">
                    <i class="fas fa-graduation-cap me-2"></i>IADSS
                </div>
                <a href="index.html">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="dashboard.html">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="analytics.html" class="active">
                    <i class="fas fa-chart-bar"></i> Analytics
                </a>
                <a href="history.html">
                    <i class="fas fa-history"></i> History
                </a>
            </div>
            <div class="col-md-9 main-content">
                <h2 class="mb-4">Analytics</h2>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <i class="fas fa-users me-2"></i>Student Performance
                            </div>
                            <div class="card-body" id="students-list">
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <i class="fas fa-book me-2"></i>Subject Difficulty Analysis
                            </div>
                            <div class="card-body" id="difficulty-list">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadStudents() {
            try {
                const response = await fetch('/api/analytics/students');
                const data = await response.json();
                const container = document.getElementById('students-list');
                
                container.innerHTML = data.map(student => `
                    <div class="student-card">
                        <div class="student-avatar">${student.initials}</div>
                        <div class="student-info">
                            <div class="student-name">${student.name}</div>
                            <div class="student-details">
                                Marks: ${student.marks}% | Attendance: ${student.attendance}%
                            </div>
                        </div>
                        <span class="risk-badge risk-${student.risk.toLowerCase()}">${student.risk} Risk</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }

        async function loadDifficulty() {
            try {
                const response = await fetch('/api/analytics/difficulty');
                const data = await response.json();
                const container = document.getElementById('difficulty-list');
                
                container.innerHTML = data.map(subject => `
                    <div class="difficulty-card">
                        <div class="difficulty-label">${subject.subject}</div>
                        <div class="progress">
                            <div class="progress-bar ${subject.value > 70 ? 'bg-danger' : subject.value > 40 ? 'bg-warning' : 'bg-success'}" 
                                 role="progressbar" 
                                 style="width: ${subject.value}%">
                                ${subject.value}%
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading difficulty:', error);
            }
        }

        loadStudents();
        loadDifficulty();
    </script>
</body>
</html>
